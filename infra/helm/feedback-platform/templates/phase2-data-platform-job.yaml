{{- if .Values.dataPlatform.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: data-platform-worker
  namespace: {{ default "feedback" .Values.namespace | quote }}
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: data-platform-worker
          image: "{{ .Values.dataPlatform.image.repository }}:{{ .Values.dataPlatform.image.tag }}"
          imagePullPolicy: {{ .Values.dataPlatform.image.pullPolicy }}
          command: ["python", "services/data-platform-worker/worker.py"]
          env:
            - { name: AWS_ENDPOINT_URL, value: {{ .Values.dataPlatform.aws.endpointUrl | quote }} }
            - { name: RAW_BUCKET, value: {{ .Values.dataPlatform.s3.rawBucket | quote }} }
            - { name: PROCESSED_BUCKET, value: {{ .Values.dataPlatform.s3.processedBucket | quote }} }
            - { name: RDS_HOST, value: {{ .Values.dataPlatform.rds.host | quote }} }
            - { name: RDS_PORT, value: {{ .Values.dataPlatform.rds.port | quote }} }
            - { name: RDS_DB_NAME, value: {{ .Values.dataPlatform.rds.dbName | quote }} }
            - { name: RDS_USERNAME, value: {{ .Values.dataPlatform.rds.username | quote }} }
            - { name: RDS_PASSWORD, value: {{ .Values.dataPlatform.rds.password | quote }} }
{{- end }}
