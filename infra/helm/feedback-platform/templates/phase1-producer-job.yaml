{{- if and .Values.ingestion.enabled .Values.ingestion.producer.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: feedback-producer
  namespace: {{ default "feedback" .Values.namespace | quote }}
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: producer
          image: "{{ .Values.ingestion.image.repository }}:{{ .Values.ingestion.image.tag }}"
          imagePullPolicy: {{ .Values.ingestion.image.pullPolicy }}
          command: ["python", "services/ingestion-worker/producer.py"]
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.ingestion.kafka.bootstrapServers | quote }}
            - name: KAFKA_TOPIC
              value: {{ .Values.ingestion.kafka.topic | quote }}
{{- end }}